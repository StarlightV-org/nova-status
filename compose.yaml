services:
 nova-postgres:
  image: postgres:17-alpine
  container_name: nova-postgres
  ports:
   - "5656:5432"
  environment:
   POSTGRES_USER: postgres
   POSTGRES_PASSWORD: password
   POSTGRES_DB: postgres
  volumes:
   - nova_postgres_data:/var/lib/postgresql/data
  restart: "no"

volumes:
 nova_postgres_data:
